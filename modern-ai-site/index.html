<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modern AI Site Preview</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .card {
      max-width: 540px;
      width: 100%;
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 1rem;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.35);
      padding: 2rem;
    }
    a.button {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.85rem 1.4rem;
      border-radius: 9999px;
      background: #7c3aed;
      color: white;
      text-decoration: none;
      font-weight: 700;
    }
    a.button:hover {
      background: #6d28d9;
    }
    code {
      background: rgba(148, 163, 184, 0.12);
      border-radius: 0.5rem;
      padding: 0.2rem 0.4rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Modern AI Site Preview</h1>
    <p>To preview this Next.js project, start the development server and open the app in your browser.</p>
    <p>
      Run <code>npm run dev</code> in the project folder, then open:
    </p>
    <p><a href="http://localhost:3000" class="button">Open http://localhost:3000</a></p>
    <p style="opacity:0.8; margin-top: 1rem;">If the server is not running, start it first with <code>npm run dev</code>.</p>
  </div>
</body>
</html>
