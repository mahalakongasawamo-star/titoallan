<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" width="640" height="480">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1018"/>
      <stop offset="50%" stop-color="#050508"/>
      <stop offset="100%" stop-color="#0e1220"/>
    </linearGradient>
    <radialGradient id="spot" cx="0.5" cy="0.42" r="0.45">
      <stop offset="0%" stop-color="#C4A44D" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#C4A44D" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="640" height="480" fill="url(#bg)"/>
  <rect width="640" height="480" fill="url(#spot)"/>

  <!-- Floor -->
  <line x1="0" y1="330" x2="640" y2="330" stroke="#1a1a2e" stroke-width="0.5" opacity="0.2"/>

  <!-- Cullinan - Tall luxury SUV, side profile -->
  <g transform="translate(320, 255)" opacity="0.85">
    <!-- Taller body - SUV proportions -->
    <path d="M-200,35 L-185,-15 L-155,-48 L-100,-68 L-20,-72 L80,-70 L150,-48 L190,-15 L205,35 L205,50 L-200,50 Z"
          fill="#10141e" stroke="#1a2030" stroke-width="0.7"/>
    <!-- Boxy roofline - SUV character -->
    <path d="M-90,-68 C-55,-105 -5,-112 50,-112 C100,-108 140,-90 165,-55"
          fill="none" stroke="#C4A44D" stroke-width="0.5" opacity="0.3"/>
    <!-- Strong D-pillar -->
    <line x1="155" y1="-50" x2="140" y2="-85" stroke="#C4A44D" stroke-width="0.5" opacity="0.2"/>
    <!-- Chrome trim -->
    <line x1="-180" y1="5" x2="190" y2="5" stroke="#C4A44D" stroke-width="0.5" opacity="0.15"/>
    <!-- Prominent grille -->
    <rect x="-195" y="-25" width="26" height="55" rx="3" fill="none" stroke="#C4A44D" stroke-width="0.8" opacity="0.3"/>
    <line x1="-182" y1="-25" x2="-182" y2="30" stroke="#C4A44D" stroke-width="0.5" opacity="0.25"/>
    <!-- Headlights -->
    <rect x="-170" y="-12" width="25" height="8" rx="4" fill="#C4A44D" opacity="0.12"/>
    <!-- Tail light -->
    <rect x="190" y="-8" width="12" height="18" rx="2" fill="#8B0000" opacity="0.15"/>
    <!-- Larger wheels -->
    <circle cx="-130" cy="50" r="30" fill="#080808" stroke="#1a1a2e" stroke-width="1.5"/>
    <circle cx="-130" cy="50" r="20" fill="none" stroke="#C4A44D" stroke-width="0.4" opacity="0.15"/>
    <circle cx="140" cy="50" r="30" fill="#080808" stroke="#1a1a2e" stroke-width="1.5"/>
    <circle cx="140" cy="50" r="20" fill="none" stroke="#C4A44D" stroke-width="0.4" opacity="0.15"/>
    <!-- Spirit of Ecstasy -->
    <line x1="-185" y1="-48" x2="-185" y2="-58" stroke="#C4A44D" stroke-width="0.7" opacity="0.35"/>
    <path d="M-188,-58 L-185,-64 L-182,-58" fill="#C4A44D" opacity="0.2"/>
  </g>

  <text x="320" y="430" text-anchor="middle" font-family="'Montserrat', sans-serif" font-size="9" letter-spacing="5" fill="#C4A44D" opacity="0.2">CULLINAN</text>
</svg>