<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1220"/>
      <stop offset="40%" stop-color="#050508"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <radialGradient id="warmGlow" cx="0.6" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#C4A44D" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#C4A44D" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#warmGlow)"/>

  <!-- Starlight headliner effect - scattered fiber optic dots -->
  <g opacity="0.6">
    <circle cx="680" cy="120" r="1" fill="#fff" opacity="0.4"/>
    <circle cx="720" cy="180" r="0.8" fill="#fff" opacity="0.3"/>
    <circle cx="800" cy="90" r="1.2" fill="#C4A44D" opacity="0.35"/>
    <circle cx="850" cy="200" r="0.6" fill="#fff" opacity="0.25"/>
    <circle cx="920" cy="140" r="1" fill="#C4A44D" opacity="0.3"/>
    <circle cx="960" cy="80" r="0.8" fill="#fff" opacity="0.35"/>
    <circle cx="1000" cy="220" r="1.1" fill="#fff" opacity="0.28"/>
    <circle cx="1060" cy="110" r="0.7" fill="#C4A44D" opacity="0.32"/>
    <circle cx="1100" cy="190" r="1" fill="#fff" opacity="0.3"/>
    <circle cx="1150" cy="60" r="0.9" fill="#fff" opacity="0.25"/>
    <circle cx="1200" cy="170" r="1.2" fill="#C4A44D" opacity="0.28"/>
    <circle cx="1260" cy="130" r="0.8" fill="#fff" opacity="0.35"/>
    <circle cx="1300" cy="210" r="0.6" fill="#fff" opacity="0.22"/>
    <circle cx="750" cy="250" r="0.7" fill="#C4A44D" opacity="0.25"/>
    <circle cx="880" cy="280" r="0.9" fill="#fff" opacity="0.2"/>
    <circle cx="1050" cy="260" r="1" fill="#C4A44D" opacity="0.22"/>
    <circle cx="1180" cy="240" r="0.8" fill="#fff" opacity="0.28"/>
    <circle cx="1320" cy="100" r="1.1" fill="#C4A44D" opacity="0.3"/>
    <circle cx="650" cy="160" r="0.9" fill="#fff" opacity="0.2"/>
    <circle cx="1400" cy="180" r="0.7" fill="#fff" opacity="0.25"/>
    <circle cx="1380" cy="70" r="1" fill="#C4A44D" opacity="0.2"/>
    <circle cx="780" cy="50" r="0.8" fill="#fff" opacity="0.3"/>
    <circle cx="940" cy="240" r="0.6" fill="#C4A44D" opacity="0.2"/>
    <circle cx="1130" cy="280" r="0.9" fill="#fff" opacity="0.18"/>
    <circle cx="1240" cy="50" r="1" fill="#fff" opacity="0.3"/>
  </g>

  <!-- Luxury interior elements - dashboard/console suggestion -->
  <g transform="translate(960, 540)" opacity="0.7">
    <!-- Center console wood grain suggestion -->
    <rect x="-120" y="50" width="240" height="200" rx="8" fill="#0e1018" stroke="#C4A44D" stroke-width="0.5" opacity="0.15"/>
    <!-- Wood grain lines -->
    <path d="M-100,80 C-50,78 50,82 100,80" fill="none" stroke="#C4A44D" stroke-width="0.3" opacity="0.1"/>
    <path d="M-100,100 C-50,98 50,102 100,100" fill="none" stroke="#C4A44D" stroke-width="0.3" opacity="0.08"/>
    <path d="M-100,120 C-50,118 50,122 100,120" fill="none" stroke="#C4A44D" stroke-width="0.3" opacity="0.1"/>

    <!-- Rotary controller -->
    <circle cx="0" cy="160" r="28" fill="#0a0a10" stroke="#C4A44D" stroke-width="0.6" opacity="0.2"/>
    <circle cx="0" cy="160" r="18" fill="none" stroke="#C4A44D" stroke-width="0.3" opacity="0.15"/>

    <!-- Clock (Rolls-Royce bespoke clock) -->
    <circle cx="0" cy="-80" r="40" fill="#080810" stroke="#C4A44D" stroke-width="0.8" opacity="0.25"/>
    <circle cx="0" cy="-80" r="35" fill="none" stroke="#C4A44D" stroke-width="0.3" opacity="0.15"/>
    <!-- Clock hands -->
    <line x1="0" y1="-80" x2="0" y2="-105" stroke="#C4A44D" stroke-width="0.6" opacity="0.3"/>
    <line x1="0" y1="-80" x2="18" y2="-72" stroke="#C4A44D" stroke-width="0.5" opacity="0.25"/>
    <!-- Hour markers -->
    <circle cx="0" cy="-115" r="1.5" fill="#C4A44D" opacity="0.2"/>
    <circle cx="30" cy="-80" r="1.5" fill="#C4A44D" opacity="0.2"/>
    <circle cx="0" cy="-45" r="1.5" fill="#C4A44D" opacity="0.2"/>
    <circle cx="-30" cy="-80" r="1.5" fill="#C4A44D" opacity="0.2"/>

    <!-- Leather stitching lines -->
    <g opacity="0.12">
      <line x1="-300" y1="-20" x2="-140" y2="-20" stroke="#C4A44D" stroke-width="0.5" stroke-dasharray="4,6"/>
      <line x1="140" y1="-20" x2="300" y2="-20" stroke="#C4A44D" stroke-width="0.5" stroke-dasharray="4,6"/>
      <line x1="-300" y1="40" x2="-140" y2="40" stroke="#C4A44D" stroke-width="0.5" stroke-dasharray="4,6"/>
      <line x1="140" y1="40" x2="300" y2="40" stroke="#C4A44D" stroke-width="0.5" stroke-dasharray="4,6"/>
    </g>

    <!-- Ventilation slats -->
    <g transform="translate(-250, -100)" opacity="0.1">
      <line x1="0" y1="0" x2="60" y2="0" stroke="#C4A44D" stroke-width="0.5"/>
      <line x1="0" y1="6" x2="60" y2="6" stroke="#C4A44D" stroke-width="0.5"/>
      <line x1="0" y1="12" x2="60" y2="12" stroke="#C4A44D" stroke-width="0.5"/>
      <line x1="0" y1="18" x2="60" y2="18" stroke="#C4A44D" stroke-width="0.5"/>
    </g>

    <g transform="translate(190, -100)" opacity="0.1">
      <line x1="0" y1="0" x2="60" y2="0" stroke="#C4A44D" stroke-width="0.5"/>
      <line x1="0" y1="6" x2="60" y2="6" stroke="#C4A44D" stroke-width="0.5"/>
      <line x1="0" y1="12" x2="60" y2="12" stroke="#C4A44D" stroke-width="0.5"/>
      <line x1="0" y1="18" x2="60" y2="18" stroke="#C4A44D" stroke-width="0.5"/>
    </g>
  </g>

  <!-- Gold accent frame edges -->
  <line x1="80" y1="80" x2="80" y2="200" stroke="#C4A44D" stroke-width="0.5" opacity="0.1"/>
  <line x1="80" y1="80" x2="200" y2="80" stroke="#C4A44D" stroke-width="0.5" opacity="0.1"/>
  <line x1="1840" y1="880" x2="1840" y2="1000" stroke="#C4A44D" stroke-width="0.5" opacity="0.1"/>
  <line x1="1720" y1="1000" x2="1840" y2="1000" stroke="#C4A44D" stroke-width="0.5" opacity="0.1"/>
</svg>