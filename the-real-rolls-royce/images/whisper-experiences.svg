<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 854" width="640" height="854">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1025"/>
      <stop offset="50%" stop-color="#050508"/>
      <stop offset="100%" stop-color="#00205B"/>
    </linearGradient>
    <radialGradient id="candleGlow" cx="0.5" cy="0.35" r="0.35">
      <stop offset="0%" stop-color="#C4A44D" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#C4A44D" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="640" height="854" fill="url(#bg)"/>
  <rect width="640" height="854" fill="url(#candleGlow)"/>

  <!-- Fine dining table scene -->
  <g transform="translate(320, 380)" opacity="0.8">
    <!-- Table surface -->
    <ellipse cx="0" cy="0" rx="200" ry="40" fill="#0c1018" stroke="#C4A44D" stroke-width="0.5" opacity="0.2"/>

    <!-- Wine glass left -->
    <g transform="translate(-80, -80)">
      <ellipse cx="0" cy="0" rx="16" ry="5" fill="none" stroke="#C4A44D" stroke-width="0.5" opacity="0.2"/>
      <path d="M-14,0 C-12,-30 12,-30 14,0" fill="none" stroke="#C4A44D" stroke-width="0.4" opacity="0.15"/>
      <line x1="0" y1="5" x2="0" y2="35" stroke="#C4A44D" stroke-width="0.4" opacity="0.15"/>
      <ellipse cx="0" cy="35" rx="12" ry="3" fill="none" stroke="#C4A44D" stroke-width="0.4" opacity="0.12"/>
    </g>

    <!-- Wine glass right -->
    <g transform="translate(80, -80)">
      <ellipse cx="0" cy="0" rx="16" ry="5" fill="none" stroke="#C4A44D" stroke-width="0.5" opacity="0.2"/>
      <path d="M-14,0 C-12,-30 12,-30 14,0" fill="none" stroke="#C4A44D" stroke-width="0.4" opacity="0.15"/>
      <line x1="0" y1="5" x2="0" y2="35" stroke="#C4A44D" stroke-width="0.4" opacity="0.15"/>
      <ellipse cx="0" cy="35" rx="12" ry="3" fill="none" stroke="#C4A44D" stroke-width="0.4" opacity="0.12"/>
    </g>

    <!-- Plate center -->
    <ellipse cx="0" cy="-30" rx="50" ry="14" fill="#0a0e18" stroke="#C4A44D" stroke-width="0.5" opacity="0.15"/>
    <ellipse cx="0" cy="-30" rx="35" ry="10" fill="none" stroke="#C4A44D" stroke-width="0.3" opacity="0.1"/>

    <!-- Candle -->
    <rect x="-3" y="-130" width="6" height="30" rx="2" fill="#C4A44D" opacity="0.1"/>
    <ellipse cx="0" cy="-130" rx="4" ry="8" fill="#C4A44D" opacity="0.12"/>
    <!-- Candle glow -->
    <circle cx="0" cy="-135" r="20" fill="#C4A44D" opacity="0.04"/>

    <!-- Cutlery -->
    <line x1="-70" y1="-50" x2="-70" y2="10" stroke="#C4A44D" stroke-width="0.4" opacity="0.12"/>
    <line x1="-60" y1="-50" x2="-60" y2="10" stroke="#C4A44D" stroke-width="0.4" opacity="0.12"/>
    <line x1="60" y1="-50" x2="60" y2="10" stroke="#C4A44D" stroke-width="0.4" opacity="0.12"/>
  </g>

  <!-- Decorative elements - chandelier suggestion -->
  <g transform="translate(320, 100)" opacity="0.15">
    <line x1="0" y1="-50" x2="0" y2="0" stroke="#C4A44D" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="3" fill="#C4A44D" opacity="0.5"/>
    <line x1="-30" y1="0" x2="30" y2="0" stroke="#C4A44D" stroke-width="0.4"/>
    <circle cx="-30" cy="8" r="2" fill="#C4A44D" opacity="0.4"/>
    <circle cx="30" cy="8" r="2" fill="#C4A44D" opacity="0.4"/>
    <circle cx="-15" cy="12" r="1.5" fill="#C4A44D" opacity="0.3"/>
    <circle cx="15" cy="12" r="1.5" fill="#C4A44D" opacity="0.3"/>
  </g>

  <!-- Bottom label area -->
  <text x="320" y="780" text-anchor="middle" font-family="'Montserrat', sans-serif" font-size="9" letter-spacing="5" fill="#C4A44D" opacity="0.2">EXPERIENCES</text>
</svg>