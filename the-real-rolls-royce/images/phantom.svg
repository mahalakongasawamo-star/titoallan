<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1220"/>
      <stop offset="50%" stop-color="#050508"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </linearGradient>
    <linearGradient id="floorGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#111827" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <radialGradient id="spotlight" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#C4A44D" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#C4A44D" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="960" height="540" fill="url(#bg)"/>
  <rect width="960" height="540" fill="url(#spotlight)"/>

  <!-- Floor -->
  <rect x="0" y="360" width="960" height="180" fill="url(#floorGrad)"/>
  <line x1="0" y1="360" x2="960" y2="360" stroke="#1a1a2e" stroke-width="0.5" opacity="0.3"/>

  <!-- Phantom - Long wheelbase luxury sedan, side profile -->
  <g transform="translate(480, 300)" opacity="0.9">
    <!-- Body -->
    <path d="M-280,30 L-260,-10 L-220,-40 L-160,-55 L-80,-58 L80,-58 L160,-55 L220,-40 L260,-10 L280,30 L280,50 L-280,50 Z"
          fill="#111420" stroke="#1a2035" stroke-width="0.8"/>
    <!-- Roofline - long elegant sweep -->
    <path d="M-140,-55 C-100,-95 -40,-108 40,-108 C100,-95 140,-75 180,-40"
          fill="none" stroke="#C4A44D" stroke-width="0.6" opacity="0.35"/>
    <!-- Pillars -->
    <line x1="-130" y1="-55" x2="-110" y2="-95" stroke="#C4A44D" stroke-width="0.4" opacity="0.2"/>
    <line x1="50" y1="-58" x2="60" y2="-95" stroke="#C4A44D" stroke-width="0.4" opacity="0.2"/>
    <line x1="170" y1="-42" x2="150" y2="-72" stroke="#C4A44D" stroke-width="0.4" opacity="0.2"/>
    <!-- Chrome trim line -->
    <line x1="-250" y1="5" x2="250" y2="5" stroke="#C4A44D" stroke-width="0.6" opacity="0.2"/>
    <!-- Grille -->
    <rect x="-270" y="-20" width="30" height="55" rx="3" fill="none" stroke="#C4A44D" stroke-width="0.8" opacity="0.3"/>
    <line x1="-255" y1="-20" x2="-255" y2="35" stroke="#C4A44D" stroke-width="0.5" opacity="0.25"/>
    <!-- Headlight -->
    <rect x="-240" y="-8" width="30" height="10" rx="5" fill="#C4A44D" opacity="0.15"/>
    <!-- Tail light -->
    <rect x="248" y="-5" width="20" height="8" rx="4" fill="#8B0000" opacity="0.2"/>
    <!-- Wheels -->
    <circle cx="-180" cy="50" r="32" fill="#080808" stroke="#1a1a2e" stroke-width="1.5"/>
    <circle cx="-180" cy="50" r="22" fill="none" stroke="#C4A44D" stroke-width="0.4" opacity="0.2"/>
    <circle cx="180" cy="50" r="32" fill="#080808" stroke="#1a1a2e" stroke-width="1.5"/>
    <circle cx="180" cy="50" r="22" fill="none" stroke="#C4A44D" stroke-width="0.4" opacity="0.2"/>
    <!-- Spirit of Ecstasy -->
    <line x1="-260" y1="-40" x2="-260" y2="-52" stroke="#C4A44D" stroke-width="0.8" opacity="0.4"/>
    <path d="M-264,-52 L-260,-60 L-256,-52" fill="#C4A44D" opacity="0.25"/>
    <!-- Ground reflection -->
    <ellipse cx="0" cy="95" rx="280" ry="12" fill="#C4A44D" opacity="0.02"/>
  </g>

  <!-- Subtle label -->
  <text x="480" y="490" text-anchor="middle" font-family="'Montserrat', sans-serif" font-size="10" letter-spacing="6" fill="#C4A44D" opacity="0.25">PHANTOM</text>
</svg>